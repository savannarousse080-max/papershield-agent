name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt -r requirements-dev.txt -r requirements-optional.txt

      - name: Run tests
        env:
          PAPERSHIELD_LLM_PROVIDER: mock
          PAPERSHIELD_PROVIDER_CONFIG_ENABLED: "0"
        run: python -m unittest discover -s tests -v

      - name: Lint Python
        run: python -m ruff check .

      - name: Check static JavaScript syntax
        run: node --check web/static/app.js

      - name: Security audit
        run: |
          python -m pip_audit -r requirements.txt
          python -m pip_audit -r requirements-optional.txt
          python -m bandit -q -r main.py agent scorer utils web
