services:
  - type: web
    name: papershield-agent
    runtime: docker
    plan: free
    autoDeploy: true
    healthCheckPath: /healthz
    envVars:
      - key: PAPERSHIELD_LLM_PROVIDER
        value: mock
      - key: PAPERSHIELD_PROVIDER_CONFIG_ENABLED
        value: "0"
      - key: PAPERSHIELD_ADMIN_TOKEN
        sync: false
      - key: PAPERSHIELD_CONFIG_ADMIN_TOKEN
        sync: false
      - key: PAPERSHIELD_REQUIRE_ADMIN_TOKEN_FOR_PROVIDER_USE
        value: "1"
      - key: PAPERSHIELD_HOSTED_FREE_RUN_LIMIT
        value: "3"
      - key: PAPERSHIELD_PROMPT_PROFILE
        value: default
      - key: PAPERSHIELD_MAX_UPLOAD_BYTES
        value: "2097152"
      - key: PAPERSHIELD_MAX_TEXT_CHARS
        value: "60000"
      - key: PAPERSHIELD_MAX_PARAGRAPHS
        value: "80"
